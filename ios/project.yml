name: Pon
options:
  bundleIdPrefix: com.enablerdao
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"

settings:
  base:
    DEVELOPMENT_TEAM: 5BV85JW8US
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    CURRENT_PROJECT_VERSION: 4
    MARKETING_VERSION: "1.0.0"

targets:
  Pon:
    type: application
    platform: iOS
    sources:
      - path: Pon/Sources
      - path: Pon/Resources
    info:
      path: Pon/Info.plist
      properties:
        CFBundleDisplayName: ポン
        CFBundleDevelopmentRegion: ja
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - pon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.enablerdao.pon
        PRODUCT_NAME: Pon
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
    entitlements:
      path: Pon/Pon.entitlements
